version: '3.8'

services:
  # --- BASE DE DATOS POSTGRES ---
  db:
    image: postgres:15-alpine
    container_name: resurrection_db_cont
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resurrection-network

  # --- COORDINADOR DE KAFKA ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: resurrection_zookeeper_cont
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - resurrection-network

  # --- MOTOR DE MENSAJERÍA KAFKA ---
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: resurrection_kafka_cont
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - resurrection-network

  # --- PANEL VISUAL DE KAFKA (ACCESO POR PUERTO 8082) ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: resurrection_kafka_ui_cont
    depends_on:
      - kafka
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - resurrection-network

# --- RECURSOS COMPARTIDOS ---
networks:
  resurrection-network:
    driver: bridge

volumes:
  postgres_data: {}
